; DIYButton — ESP32-WROOM-DA
; Arduino core 3.3.8 (arduino-esp32)
; Build with: pio run -t upload

[env:esp32dev]
platform  = espressif32@6.9.0   ; pins arduino core ~3.3.8
board     = esp32dev
framework = arduino

; Partition scheme: default (1.2 MB app / 1.5 MB SPIFFS)
; If you hit "doesn't fit" errors, switch to huge_app:
; board_build.partitions = huge_app.csv

lib_deps =
  knolleary/PubSubClient @ ^2.8

monitor_speed = 115200
upload_speed  = 921600

build_flags =
  -DCORE_DEBUG_LEVEL=3          ; verbose serial logs (remove for prod)
  -DMQTT_MAX_PACKET_SIZE=1024   ; safety net if PubSubClient ignores setBufferSize
